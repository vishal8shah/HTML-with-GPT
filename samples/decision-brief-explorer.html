  <style>
:root {
  color-scheme: dark;
  --bg: oklch(14% 0 0);
  --bg-2: oklch(11% 0 0);
  --surface: oklch(17% 0 0);
  --surface-2: oklch(20% 0 0);
  --ink: oklch(96% 0 0);
  --muted: oklch(66% 0 0);
  --faint: oklch(48% 0 0);
  --line: oklch(26% 0 0);
  --line-strong: oklch(34% 0 0);
  --accent: oklch(82% .14 78);
  --accent-2: #ffb43b;
  --accent-ink: oklch(14% 0 0);
  --blue: #62a8ff;
  --green: #63c981;
  --red: #ff6b57;
  --orange: #ff8b3d;
  --shadow: 0 24px 80px rgba(0, 0, 0, .38);
  --radius: 8px;
  --sans: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
  --mono: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
}

html[data-theme="light"] {
  color-scheme: light;
  --bg: oklch(98.5% 0 0);
  --bg-2: oklch(96% 0 0);
  --surface: oklch(100% 0 0);
  --surface-2: oklch(94.5% 0 0);
  --ink: oklch(18% 0 0);
  --muted: oklch(45% 0 0);
  --faint: oklch(60% 0 0);
  --line: oklch(88% 0 0);
  --line-strong: oklch(76% 0 0);
  --accent: oklch(78% .14 78);
  --accent-2: #c68509;
  --accent-ink: oklch(18% 0 0);
  --shadow: 0 24px 70px rgba(0, 0, 0, .12);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-width: 320px;
  background:
    radial-gradient(circle at 78% 6%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 34rem),
    linear-gradient(180deg, var(--bg-2), var(--bg) 30rem),
    var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  opacity: .18;
  background-image:
    radial-gradient(circle, color-mix(in srgb, var(--line-strong) 55%, transparent) 1px, transparent 1.5px),
    linear-gradient(color-mix(in srgb, var(--line) 50%, transparent) 1px, transparent 1px),
    linear-gradient(90deg, color-mix(in srgb, var(--line) 50%, transparent) 1px, transparent 1px);
  background-size: 18px 18px, 36px 36px, 36px 36px;
  mask-image: linear-gradient(180deg, #000, transparent 78%);
}

a {
  color: inherit;
}

button,
input,
select,
textarea {
  font: inherit;
}

a:focus-visible,
button:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
}

.sample-shell {
  width: min(1440px, calc(100% - 40px));
  margin: 0 auto;
}

.sample-header {
  position: sticky;
  top: 0;
  z-index: 30;
  border-bottom: 1px solid var(--line);
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter: blur(18px);
}

.sample-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  min-height: 72px;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  color: var(--ink);
  font-family: var(--mono);
  text-decoration: none;
}

.brand-mark {
  display: grid;
  width: 42px;
  height: 42px;
  place-items: center;
  border: 1px solid var(--accent);
  border-radius: 6px;
  color: var(--accent);
  font-size: 19px;
}

.brand-text {
  display: grid;
  gap: 1px;
  font-size: 13px;
  line-height: 1.15;
  text-transform: uppercase;
}

.brand-text small {
  color: var(--muted);
}

.links {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
}

.links a,
.links button {
  border: 0;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font: 800 12px/1 var(--mono);
  padding: 10px 11px;
  text-decoration: none;
  text-transform: uppercase;
}

.links a:hover,
.links button:hover {
  background: var(--surface);
  color: var(--accent);
}

.theme-toggle {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  font: 700 12px/1 var(--mono);
  padding: 8px 11px;
  text-transform: uppercase;
}

.theme-toggle::before {
  content: "";
  width: 22px;
  height: 12px;
  border: 1px solid var(--accent);
  border-radius: 999px;
  background: linear-gradient(90deg, transparent 44%, var(--accent) 45%);
}

.sample-hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(360px, .52fr);
  gap: 18px;
  align-items: stretch;
  padding: 38px 0 20px;
}

.hero-panel,
.proof-panel {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: color-mix(in srgb, var(--surface) 86%, transparent);
  padding: 26px;
}

.hero-panel {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(320px, .72fr);
  gap: 24px;
  align-items: center;
}

.crumb {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  color: var(--muted);
  font: 700 13px/1.2 var(--mono);
}

.crumb a {
  color: var(--muted);
  text-decoration: none;
}

.crumb span:last-child {
  color: var(--accent);
}

.sample-subnav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 12px 0 26px;
}

.sample-pager {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px;
}

.sample-pager a,
.sample-pager span {
  display: inline-flex;
  align-items: center;
  min-height: 34px;
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  color: var(--muted);
  font: 800 11px/1 var(--mono);
  padding: 9px 10px;
  text-decoration: none;
  text-transform: uppercase;
}

.sample-pager a {
  color: var(--ink);
}

.sample-pager a:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.sample-pager span {
  border-color: color-mix(in srgb, var(--accent) 48%, var(--line));
  color: var(--accent);
}

.sample-hero h1 {
  margin: 0;
  font-family: var(--mono);
  font-size: clamp(38px, 5.4vw, 74px);
  font-weight: 500;
  line-height: 1.05;
  letter-spacing: 0;
  text-transform: uppercase;
}

.sample-hero p {
  max-width: 760px;
  margin: 18px 0 0;
  color: var(--muted);
  font-size: 17px;
}

.hero-stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.stat {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--bg-2);
  padding: 14px;
}

.stat strong {
  display: block;
  color: var(--accent);
  font: 800 24px/1 var(--mono);
}

.stat span {
  display: block;
  margin-top: 6px;
  color: var(--muted);
  font: 700 11px/1.35 var(--mono);
  text-transform: uppercase;
}

.proof-panel {
  display: grid;
  gap: 22px;
}

.proof-panel h2,
.workspace h2,
.panel h2,
.panel h3 {
  margin: 0;
  font: 700 15px/1.35 var(--mono);
  letter-spacing: .03em;
  text-transform: uppercase;
}

.proof-list {
  display: grid;
  gap: 9px;
  color: var(--muted);
  font: 600 13px/1.45 var(--mono);
}

.proof-list span::before {
  content: ">";
  color: var(--accent);
  margin-right: 9px;
}

.badge-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.badge {
  border: 1px solid var(--line-strong);
  border-radius: 4px;
  color: var(--muted);
  font: 800 11px/1 var(--mono);
  padding: 7px 9px;
}

.badge.good {
  border-color: color-mix(in srgb, var(--accent) 48%, var(--line));
  color: var(--accent);
}

.app-grid {
  display: grid;
  grid-template-columns: 290px minmax(0, 1fr) 360px;
  gap: 14px;
  align-items: start;
  padding: 0 0 78px;
}

.panel,
.workspace {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: color-mix(in srgb, var(--surface) 88%, transparent);
  box-shadow: 0 12px 34px rgba(0, 0, 0, .16);
}

.panel {
  padding: 18px;
}

.workspace {
  min-height: 620px;
  overflow: hidden;
}

.workspace-head,
.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 1px solid var(--line);
  padding: 16px 18px;
}

.workspace-body {
  padding: 18px;
}

.control-group {
  display: grid;
  gap: 14px;
  margin-top: 18px;
}

.control-group button.active {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 12%, var(--surface));
  color: var(--accent);
}

label,
.label {
  display: grid;
  gap: 7px;
  color: var(--muted);
  font: 760 12px/1.35 var(--mono);
  text-transform: uppercase;
}

input,
select,
textarea {
  width: 100%;
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  background: var(--bg-2);
  color: var(--ink);
  padding: 11px 12px;
}

input[type="range"] {
  accent-color: var(--accent);
}

textarea {
  min-height: 130px;
  resize: vertical;
}

button,
.button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 40px;
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  background: var(--surface);
  color: var(--ink);
  cursor: pointer;
  font: 820 12px/1 var(--mono);
  padding: 10px 13px;
  text-decoration: none;
  text-transform: uppercase;
}

button.primary,
.button.primary {
  border-color: var(--accent);
  background: var(--accent);
  color: var(--accent-ink);
}

button:hover,
.button:hover {
  border-color: var(--accent);
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tabs button.active {
  border-color: var(--accent);
  color: var(--accent);
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.mini-card {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--bg-2);
  padding: 15px;
}

.mini-card.selected {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 12%, var(--surface));
}

.mini-card h3 {
  margin: 0 0 8px;
  font: 700 16px/1.3 var(--mono);
  text-transform: none;
}

.mini-card p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
}

.metric {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid var(--line);
  padding: 10px 0;
}

.metric:last-child {
  border-bottom: 0;
}

.meter {
  height: 10px;
  border-radius: 999px;
  background: var(--line);
  overflow: hidden;
}

.meter span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent), var(--green));
}

.data-table,
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th,
td {
  border-bottom: 1px solid var(--line);
  padding: 10px 9px;
  text-align: left;
  vertical-align: top;
}

th {
  color: var(--faint);
  font: 800 11px/1.25 var(--mono);
  text-transform: uppercase;
}

td {
  color: var(--muted);
}

td strong {
  color: var(--ink);
}

.status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  color: var(--muted);
  font: 800 11px/1 var(--mono);
  padding: 5px 8px;
}

.status::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: currentColor;
}

.status.high,
.status.critical,
.status.blocked,
.status.missing {
  color: var(--red);
}

.status.medium,
.status.review,
.status.draft {
  color: var(--accent);
}

.status.low,
.status.ready,
.status.approved,
.status.done {
  color: var(--green);
}

.note {
  border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  color: var(--ink);
  padding: 13px;
}

.note.warning {
  border-left-color: var(--orange);
}

.note.danger {
  border-left-color: var(--red);
  background: color-mix(in srgb, var(--red) 11%, transparent);
}

.output {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--bg-2);
  color: var(--ink);
  font: 650 12px/1.55 var(--mono);
  min-height: 190px;
  overflow: auto;
  padding: 14px;
  white-space: pre-wrap;
}

.diagram {
  width: 100%;
  min-height: 300px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background:
    radial-gradient(circle, color-mix(in srgb, var(--line-strong) 58%, transparent) 1px, transparent 1.5px),
    var(--bg-2);
  background-size: 18px 18px;
}

.diagram text {
  fill: var(--ink);
  font: 750 12px var(--mono);
  pointer-events: none;
}

.diagram .node {
  fill: var(--surface);
  stroke: var(--line-strong);
  stroke-width: 1.5;
  cursor: pointer;
}

.diagram .node.active {
  fill: color-mix(in srgb, var(--accent) 13%, var(--surface));
  stroke: var(--accent);
  stroke-width: 2.5;
}

.diagram .node.high {
  stroke: var(--red);
}

.diagram .node.medium {
  stroke: var(--accent);
}

.diagram .node.low {
  stroke: var(--green);
}

.diagram .line {
  fill: none;
  stroke: var(--faint);
  stroke-width: 1.8;
}

.diagram .line.hot {
  stroke: var(--accent);
  stroke-width: 2.6;
}

.diagram .line.danger {
  stroke: var(--red);
}

.diagram .line.dashed {
  stroke-dasharray: 5 5;
}

.impact-presentation-active .app-grid {
  grid-template-columns: 1fr;
}

.impact-presentation-active [data-controls],
.impact-presentation-active [data-inspector] {
  display: none;
}

.impact-presentation-active .workspace {
  min-height: 760px;
}

.impact-presenter-shell {
  display: grid;
  gap: 16px;
}

.impact-presenter-top {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  align-items: flex-start;
  padding: 16px;
  border: 1px solid color-mix(in srgb, var(--accent) 45%, var(--line));
  border-radius: 8px;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--accent) 10%, transparent), transparent 44%),
    var(--bg-2);
}

.impact-presenter-top span,
.panel-label {
  display: block;
  color: var(--accent);
  font: 850 11px/1.2 var(--mono);
  letter-spacing: .08em;
  text-transform: uppercase;
}

.impact-presenter-top h2 {
  margin: 7px 0 0;
  color: var(--ink);
  font-size: clamp(30px, 5vw, 56px);
  letter-spacing: -0.04em;
  line-height: .95;
}

.impact-presenter-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

.impact-presenter {
  display: grid;
  grid-template-columns: minmax(180px, 220px) minmax(0, 1fr);
  gap: 14px;
}

.impact-slide-rail {
  display: grid;
  align-content: start;
  gap: 8px;
}

.impact-slide-button {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 10px;
  align-items: center;
  min-height: 62px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--bg-2);
  color: var(--muted);
  text-align: left;
}

.impact-slide-button span {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  color: var(--accent);
  font: 900 11px/1 var(--mono);
}

.impact-slide-button.active {
  border-color: color-mix(in srgb, var(--accent) 62%, var(--line));
  background: color-mix(in srgb, var(--accent) 12%, var(--bg-2));
  color: var(--ink);
}

.impact-stage {
  display: grid;
  grid-template-columns: minmax(0, 1.55fr) minmax(240px, .45fr);
  grid-template-areas:
    "map inspector"
    "evidence notes";
  gap: 14px;
}

.impact-map-card,
.impact-inspector,
.impact-evidence-drawer,
.impact-notes {
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--surface) 88%, transparent), var(--bg-2));
  box-shadow: 0 18px 70px color-mix(in srgb, #000 20%, transparent);
}

.impact-map-card {
  position: relative;
  grid-area: map;
  overflow: hidden;
}

.impact-map-card::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle at 50% 42%, color-mix(in srgb, var(--accent) 13%, transparent), transparent 48%);
}

.impact-map {
  position: relative;
  min-height: 430px;
  border: 0;
  border-radius: 8px;
  background:
    radial-gradient(circle, color-mix(in srgb, var(--line-strong) 58%, transparent) 1px, transparent 1.5px),
    color-mix(in srgb, var(--bg-2) 82%, #000);
  background-size: 20px 20px;
}

.diagram .node.spotlight {
  filter: drop-shadow(0 0 14px color-mix(in srgb, var(--accent) 75%, transparent));
}

.diagram .line.critical {
  stroke-dasharray: 10 7;
  animation: dashFlow 1.6s linear infinite;
}

.impact-inspector {
  grid-area: inspector;
  padding: 16px;
}

.impact-inspector .note,
.impact-notes p {
  margin-top: 12px;
}

.muted-text {
  color: var(--muted);
}

.impact-evidence-drawer {
  grid-area: evidence;
  padding: 16px;
  animation: drawerReveal .28s ease both;
}

.impact-notes {
  grid-area: notes;
  padding: 16px;
}

.impact-notes p {
  color: var(--ink);
  font-size: 14px;
}

.impact-timeline {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 8px;
  margin: 0;
  padding: 0;
  list-style: none;
}

.impact-timeline-step {
  display: grid;
  gap: 8px;
  min-height: 74px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--bg-2);
  color: var(--muted);
  font: 800 11px/1.25 var(--mono);
}

.impact-timeline-step span {
  display: grid;
  place-items: center;
  width: 24px;
  height: 24px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
}

.impact-timeline-step.complete {
  color: var(--ink);
  border-color: color-mix(in srgb, var(--accent) 42%, var(--line));
}

.impact-timeline-step.current {

function $(selector, scope = document) {
  return scope.querySelector(selector);
}

function $$(selector, scope = document) {
  return Array.from(scope.querySelectorAll(selector));
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function statusClass(value) {
  return String(value || "").toLowerCase().replaceAll(" ", "-");
}

function downloadText(filename, text, type = "text/plain;charset=utf-8") {
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.append(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

async function copyText(text, button) {
  try {
    await navigator.clipboard.writeText(text);
    const old = button.textContent;
    button.textContent = "Copied";
    setTimeout(() => {
      button.textContent = old;
    }, 1200);
  } catch {
    downloadText("artifact.txt", text);
  }
}

function renderTable(headers, rows) {

}

function setOutput(text) {

  if (output) {
    output.setAttribute("aria-live", "polite");
    output.textContent = text;
  }
}

function riskBand(score) {
  if (score >= 16) return ["Critical", "critical"];
  if (score >= 10) return ["High", "high"];
  if (score >= 5) return ["Medium", "medium"];
  return ["Low", "low"];
}

function parseTimeValue(value) {
  const [hours, minutes] = String(value).split(":").map(Number);
  return (hours || 0) * 60 + (minutes || 0);
}

function setupTheme() {
  const html = document.documentElement;
  const stored = localStorage.getItem("enterprise-html-theme");
  html.dataset.theme = stored || "dark";

  function sync() {
    $$("[data-theme-toggle]").forEach((button) => {
      const isLight = html.dataset.theme === "light";
      button.textContent = isLight ? "Dark" : "Light";
      button.setAttribute("aria-label", `Switch to ${isLight ? "dark" : "light"} mode`);
    });
  }

  document.addEventListener("click", (event) => {
    const button = event.target.closest("[data-theme-toggle]");
    if (!button) return;
    html.dataset.theme = html.dataset.theme === "light" ? "dark" : "light";
    localStorage.setItem("enterprise-html-theme", html.dataset.theme);
    sync();
  });
  sync();
}

function renderDecision() {
  renderShell();
  $("[data-workspace-title]").textContent = "Decision model";
  const defaults = { speed: 30, confidence: 25, effort: 20, risk: 15, reach: 10 };
  const options = [
    { name: "Guided HTML artifact", speed: 92, confidence: 78, effort: 82, risk: 66, reach: 86, stakeholders: [88, 76, 72, 84, 68], note: "Best for a fast, reviewable artifact that can be attached to a discussion." },
    { name: "Slide-only summary", speed: 76, confidence: 52, effort: 92, risk: 38, reach: 62, stakeholders: [54, 62, 45, 70, 58], note: "Familiar and quick, but weak for interaction, traceability, and reuse." },
    { name: "Platform backlog item", speed: 38, confidence: 88, effort: 44, risk: 82, reach: 78, stakeholders: [74, 86, 90, 60, 82], note: "Most durable for governed integration, but needs prioritization and delivery capacity." }
  ];
  const weights = { ...defaults };
  $("[data-controls]").innerHTML = `
    <h2>Weights</h2>
    <div class="control-group">
      ${Object.keys(weights).map((key) => `<label>${key}<input type="range" min="0" max="100" value="${weights[key]}" data-weight="${key}"></label>`).join("")}
      <button data-reset-weights>Reset weights</button>
    </div>
    <div class="note" data-weight-total></div>
  `;
  $("[data-workspace-actions]").innerHTML = `<button class="primary" data-copy>Copy brief</button><button data-download>Download</button>`;
  $("[data-workspace]").innerHTML = `<div class="cards" data-options></div><svg class="diagram" viewBox="0 0 760 260" data-radar aria-label="Decision radar"></svg><pre class="output" data-output aria-live="polite"></pre>`;
  $("[data-inspector]").innerHTML = `<h2>Stakeholder heatmap</h2><p>Scores reflect fictional review friction and confidence.</p><div class="heatmap" data-heatmap></div><div class="note" data-decision-note aria-live="polite"></div><div class="contribution-grid" data-contributions></div>`;
  function update() {
    Object.keys(weights).forEach((key) => { weights[key] = Number($(`[data-weight="${key}"]`).value); });
    const total = Object.values(weights).reduce((sum, value) => sum + value, 0) || 1;
    const normalized = Object.fromEntries(Object.entries(weights).map(([key, value]) => [key, value / total]));
    const axes = ["speed", "confidence", "effort", "risk", "reach"];
    const scored = options.map((option) => ({
      ...option,
      score: Math.round((option.speed * weights.speed + option.confidence * weights.confidence + option.effort * weights.effort + option.risk * weights.risk + option.reach * weights.reach) / total),
      contribution: Object.fromEntries(axes.map((key) => [key, Math.round(option[key] * normalized[key])]))
    })).sort((a, b) => b.score - a.score);
    $("[data-weight-total]").textContent = `Weights normalised to 100%. Raw total: ${total}.`;
    $("[data-options]").innerHTML = scored.map((option, index) => `<section class="mini-card ${index === 0 ? "selected" : ""}"><h3>${escapeHtml(option.name)}</h3><p>${escapeHtml(option.note)}</p><div class="meter"><span style="width:${option.score}%"></span></div><p><strong>${option.score}/100</strong> weighted fit</p></section>`).join("");
    const best = scored[0];
    const center = [380, 132];
    const points = axes.map((axis, index) => {
      const angle = -Math.PI / 2 + index * Math.PI * 2 / axes.length;
      return [center[0] + Math.cos(angle) * best[axis] * 1.05, center[1] + Math.sin(angle) * best[axis] * 1.05];
    });
    $("[data-radar]").innerHTML = `${[45, 75, 105].map((r) => `<polygon points="${axes.map((_, i) => `${center[0] + Math.cos(-Math.PI / 2 + i * Math.PI * 2 / axes.length) * r},${center[1] + Math.sin(-Math.PI / 2 + i * Math.PI * 2 / axes.length) * r}`).join(" ")}" fill="none" stroke="var(--line)"/>`).join("")}${axes.map((axis, i) => `<line class="line" x1="${center[0]}" y1="${center[1]}" x2="${center[0] + Math.cos(-Math.PI / 2 + i * Math.PI * 2 / axes.length) * 118}" y2="${center[1] + Math.sin(-Math.PI / 2 + i * Math.PI * 2 / axes.length) * 118}"/><text x="${center[0] + Math.cos(-Math.PI / 2 + i * Math.PI * 2 / axes.length) * 136 - 28}" y="${center[1] + Math.sin(-Math.PI / 2 + i * Math.PI * 2 / axes.length) * 136}">${axis}</text>`).join("")}<polygon points="${points.map((point) => point.join(",")).join(" ")}" fill="color-mix(in srgb, var(--accent) 22%, transparent)" stroke="var(--accent)" stroke-width="2"/>`;
    $("[data-heatmap]").innerHTML = best.stakeholders.map((score) => `<span style="background: color-mix(in srgb, var(--accent) ${score}%, var(--bg-2));"></span>`).join("");
    $("[data-decision-note]").textContent = best.note;
    $("[data-contributions]").innerHTML = axes.map((axis) => `<div class="contribution-row"><span>${axis}</span><div class="meter"><span style="width:${Math.min(100, best.contribution[axis] * 4)}%"></span></div><strong>${best.contribution[axis]}</strong></div>`).join("");
    setOutput(`Decision brief draft\n\nRecommendation: ${best.name}\nWeighted fit: ${best.score}/100\nNormalised weights: ${axes.map((axis) => `${axis} ${Math.round(normalized[axis] * 100)}%`).join(", ")}\nWhy: ${best.note}\n\nReview boundary: this is a structured decision aid, not spend approval, risk acceptance, or governance sign-off.`);
  }
  $$("[data-weight]").forEach((input) => input.addEventListener("input", update));
  $("[data-reset-weights]").addEventListener("click", () => { Object.assign(weights, defaults); Object.keys(weights).forEach((key) => { $(`[data-weight="${key}"]`).value = weights[key]; }); update(); });
  $("[data-copy]").addEventListener("click", (event) => copyText($("[data-output]").textContent, event.currentTarget));
  $("[data-download]").addEventListener("click", () => downloadText("decision-brief.txt", $("[data-output]").textContent));
  update();
}

function parseCsv(text, rowLimit = 500) {
  const records = [];
  let row = [];
  let cell = "";
  let quoted = false;
  let fieldStarted = false;

  function pushCell() {
    row.push(cell);
    cell = "";
    fieldStarted = false;
  }

  function pushRow() {
    if (row.some((value) => value.length)) records.push(row);
    row = [];
  }

  for (let index = 0; index < text.length; index += 1) {
    const char = text[index];
    const next = text[index + 1];
    if (quoted) {
      if (char === '"' && next === '"') {
        cell += '"';
        index += 1;
      } else if (char === '"') {
        quoted = false;
      } else {
        cell += char;
      }
    } else if (char === '"' && !fieldStarted) {
      quoted = true;
      fieldStarted = true;
    } else if (char === ",") {
      pushCell();
    } else if (char === "\n" || char === "\r") {
      if (char === "\r" && next === "\n") index += 1;
      pushCell();
      pushRow();
    } else {
      cell += char;
      fieldStarted = true;
    }
  }
  pushCell();
  pushRow();
  if (!records.length) return { headers: [], rows: [], totalRows: 0, truncated: false };
  const headers = records.shift().map((header, index) => header.trim() || `Column ${index + 1}`);
  const totalRows = records.length;
  const rows = records.slice(0, rowLimit).map((cells) => Object.fromEntries(headers.map((header, index) => [header, cells[index] || ""])));
  return { headers, rows, totalRows, truncated: totalRows > rowLimit };
}

function toCsv(rows) {
  if (!rows.length) return "";
  const headers = Object.keys(rows[0]);
  const encode = (value) => {
    const text = String(value ?? "");
    return /[",\n\r]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
  };
  return [headers.join(","), ...rows.map((row) => headers.map((header) => encode(row[header])).join(","))].join("\n");
}
function renderCsv() {
  renderShell();
  $("[data-workspace-title]").textContent = "Local CSV triage";
  const CSV_ROW_LIMIT = 500;
  const defaultCsv = `request,owner,status,risk,amount
Customer notice refresh,Asha,ready,low,12000
Vendor workflow review,Ben,review,medium,42000
Manual upload exception,,blocked,high,86000
Pricing FAQ update,Mina,ready,low,9000
Data extract request,Leo,review,high,64000
Portal wording change,Sam,draft,medium,18000`;
  let csvState = parseCsv(defaultCsv, CSV_ROW_LIMIT);
  $("[data-controls]").innerHTML = `
    <h2>Input</h2>
    <div class="control-group">
      <label>Upload CSV<input type="file" accept=".csv,text/csv" data-file></label>
      <label>Paste CSV<textarea data-csv>${defaultCsv}</textarea></label>
      <label>Risk filter<select data-filter><option value="all">All</option><option>low</option><option>medium</option><option>high</option></select></label>
    </div>
    <div class="note">This demo processes up to ${CSV_ROW_LIMIT} data rows in the browser.</div>
  `;
  $("[data-workspace-actions]").innerHTML = `<button class="primary" data-export>Download cleaned CSV</button>`;
  $("[data-workspace]").innerHTML = `<div class="hero-stats" data-profile></div><div data-csv-notice></div><svg class="diagram" viewBox="0 0 760 230" data-chart aria-label="CSV risk chart"></svg><div data-table></div>`;
  $("[data-inspector]").innerHTML = `<h2>Quality findings</h2><div data-findings></div>`;

  function inferTypes(rows, headers) {
    return Object.fromEntries(headers.map((header) => {
      const values = rows.map((row) => row[header]).filter((value) => String(value).trim().length);
      if (!values.length) return [header, "text"];
      const numberLike = values.every((value) => /^-?\d+(\.\d+)?$/.test(String(value).trim()));
      const dateLike = values.every((value) => /^\d{4}-\d{2}-\d{2}$/.test(String(value).trim()) || (!Number.isFinite(Number(value)) && !Number.isNaN(Date.parse(value))));
      return [header, numberLike ? "number" : dateLike ? "date" : "text"];
    }));
  }

  function renderCsvTable(headers, rows, types) {
    if (!rows.length) return "<p>No rows.</p>";
    return `<table><thead><tr>${headers.map((header) => `<th>${escapeHtml(header)}<span class="type-badge">${escapeHtml(types[header])}</span></th>`).join("")}</tr></thead><tbody>${rows.map((row) => `<tr>${headers.map((header) => `<td>${escapeHtml(row[header] || "Missing")}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
  }

  function update() {
    const filter = $("[data-filter]").value;
    const rows = csvState.rows;
    const headers = csvState.headers;
    const visible = rows.filter((row) => filter === "all" || row.risk === filter);
    const missing = rows.filter((row) => Object.values(row).some((value) => !value)).length;
    const high = rows.filter((row) => row.risk === "high").length;
    const types = inferTypes(rows, headers);
    $("[data-profile]").innerHTML = [["Rows", rows.length], ["Missing", missing], ["High risk", high]].map(([label, value]) => metricCard(value, label)).join("");

  update();
}

  $("[data-controls]").innerHTML = `

      <label>Mitigation<textarea data-mitigation>Limit use to fictional test records, require peer review, and retire after the approved workflow is available.</textarea></label>

  `;
  $("[data-workspace-actions]").innerHTML = `<button class="primary" data-copy>Copy brief</button><button data-print>Print</button>`;
  $("[data-workspace]").innerHTML = `<div data-risk-band></div><div class="matrix" data-matrix></div><div class="timeline" data-risk-timeline></div><pre class="output" data-output aria-live="polite"></pre>`;
  $("[data-inspector]").innerHTML = `<h2>Control checklist</h2><div data-control-list></div>`;
  function renderControls() {
    $("[data-control-list]").innerHTML = controls.map((item, index) => `<div class="toggle-row"><span>${escapeHtml(item)}</span><label class="switch"><input type="checkbox" data-control="${index}" ${checkedControls.has(index) ? "checked" : ""}><span class="slider"></span></label></div>`).join("");
    $$("[data-control]").forEach((box) => box.addEventListener("change", () => {
      const index = Number(box.dataset.control);
      if (box.checked) checkedControls.add(index); else checkedControls.delete(index);
      update(false);
    }));
  }
  function update(renderList = true) {
    const likelihood = Number($("[data-likelihood]").value);
    const impact = Number($("[data-impact]").value);
    const inherent = likelihood * impact;
    const residual = Math.max(1, inherent - checkedControls.size * 2);
    const [inherentName, inherentClass] = riskBand(inherent);
    const [residualName, residualClass] = riskBand(residual);
    $("[data-risk-band]").innerHTML = `<div class="note"><strong>Inherent risk:</strong> <span class="risk-band ${inherentClass}">${inherentName} ${inherent}/25</span> <strong>Residual risk:</strong> <span class="risk-band ${residualClass}">${residualName} ${residual}/25</span></div>`;
    $("[data-matrix]").innerHTML = Array.from({ length: 25 }, (_, index) => {
      const x = index % 5 + 1;
      const y = Math.floor(index / 5) + 1;
      const [, cellClass] = riskBand(x * y);
      return `<div class="matrix-cell ${cellClass} ${x === likelihood && y === impact ? "active" : ""}">${x}x${y}</div>`;
    }).join("");
    $("[data-risk-timeline]").innerHTML = ["Draft brief", "Peer review", "Risk forum", "Retire workaround"].map((item, index) => `<section class="event"><time>Step ${index + 1}</time><div><strong>${item}</strong><p>${index < 2 ? "Artifact can help prepare this step." : "Approval remains outside this demo."}</p></div></section>`).join("");
    if (renderList) renderControls();
    setOutput(`Risk acceptance draft\n\nScenario: ${$("[data-risk-name]").value}\nInherent risk: ${inherentName} (${inherent}/25)\nResidual risk after checked mitigations: ${residualName} (${residual}/25)\nLikelihood: ${likelihood}/5\nImpact: ${impact}/5\nControls checked: ${checkedControls.size}/${controls.length}\n\nMitigation:\n${$("[data-mitigation]").value}\n\nBoundary: draft only. Formal acceptance requires approved risk governance.`);
  }
  $$("input, textarea", $("[data-controls]")).forEach((field) => field.addEventListener("input", () => update(false)));
  $("[data-copy]").addEventListener("click", (event) => copyText($("[data-output]").textContent, event.currentTarget));
  $("[data-print]").addEventListener("click", () => window.print());
  update();
}

function renderConversation() {
  renderShell();
  $("[data-workspace-title]").textContent = "Conversation simulator";
  const scenarios = {
    delay: "We expected an answer yesterday. Why is this still waiting?",
    data: "Can you explain where our data is stored and who can access it?",
    complaint: "The previous message was confusing and made it sound like the change was already approved.",
    escalation: "I need this escalated now because our leadership meeting is tomorrow."
  };
  const drafts = {
    "Clear and calm": "I understand the concern. What is confirmed is that the review is still open. I will check the accountable owner and give you the approved update window.",
    "Brief and practical": "Thanks for raising it. I will confirm the owner, current status, and next action, then come back through the approved support path.",
    "Empathetic and detailed": "I can see why this creates uncertainty. I will separate what is confirmed from what still needs approval, then share the next step, owner, and expected update path."
  };
  const replies = {
    neutral: "Customer accepts the update path.",
    challenge: "Customer asks for a guaranteed completion date.",
    escalation: "Customer asks for a senior escalation and written confirmation."
  };
  $("[data-controls]").innerHTML = `
    <h2>Scenario</h2>
    <div class="control-group">
      <label>Customer intent<select data-intent>${Object.keys(scenarios).map((key) => `<option value="${key}">${key}</option>`).join("")}</select></label>
      <label>Tone<select data-tone>${Object.keys(drafts).map((tone) => `<option>${tone}</option>`).join("")}</select></label>
      <label>Customer reply<select data-reply>${Object.keys(replies).map((key) => `<option value="${key}">${key}</option>`).join("")}</select></label>
    </div>
  `;
  $("[data-workspace-actions]").innerHTML = `<button class="primary" data-copy>Copy response</button>`;
  $("[data-workspace]").innerHTML = `<div class="cards"><section class="mini-card"><h3>Listen</h3><p>Acknowledge before explaining.</p></section><section class="mini-card"><h3>Bound</h3><p>Avoid unsupported promises.</p></section><section class="mini-card"><h3>Next</h3><p>Give one owner and step.</p></section></div><label>Editable response<textarea class="response-editor" data-response></textarea></label><pre class="output" data-output aria-live="polite"></pre>`;
  $("[data-inspector]").innerHTML = `<h2>Quality checklist</h2><div data-checks></div><h3>Branch</h3><div class="note" data-branch aria-live="polite"></div>`;
  const checks = [
    ["Acknowledges concern", (text) => /understand|thanks|see why|concern/i.test(text)],
    ["Separates known from unknown", (text) => /confirmed|still needs|current status|review is still open/i.test(text)],
    ["Avoids policy promises", (text) => !/guarantee|approved already|definitely|promise/i.test(text)],
    ["Names next step", (text) => /next|owner|check|confirm|support path/i.test(text)],
    ["Uses safe wording", (text) => /approved|accountable|review|support path/i.test(text)],
    ["Routes formal approval elsewhere", (text) => /approved support|approved update|formal approval|accountable owner/i.test(text)]
  ];
  function branchAdvice(reply) {
    if (reply === "challenge") return "Do not guarantee a date. Offer the approved update window and owner confirmation.";
    if (reply === "escalation") return "Acknowledge urgency, route through the escalation owner, and avoid inventing authority.";
    return "Confirm the next update path and keep the message bounded.";
  }
  function update(resetDraft = true) {
    const intent = $("[data-intent]").value;
    const tone = $("[data-tone]").value;
    const reply = $("[data-reply]").value;
    if (resetDraft) $("[data-response]").value = `${drafts[tone]} For anything account-specific or policy-sensitive, I will use the approved support process.`;
    const text = $("[data-response]").value;
    const results = checks.map(([label, test]) => [label, test(text)]);
    const score = results.filter(([, pass]) => pass).length;
    const advice = branchAdvice(reply);
    $("[data-checks]").innerHTML = results.map(([label, pass]) => `<div class="metric"><span>${escapeHtml(label)}</span><span class="status ${pass ? "ready" : "missing"}">${pass ? "Pass" : "Review"}</span></div>`).join("");
    $("[data-branch]").textContent = `${replies[reply]} ${advice}`;
    setOutput(`Fictional customer says:\n"${scenarios[intent]}"\n\nDraft response (${score}/6 quality checks):\n${text}\n\nBranch: ${replies[reply]}\nRecommended next move: ${advice}\n\nBoundary: not approved customer communication.`);
  }
  $$("select", $("[data-controls]")).forEach((select) => select.addEventListener("change", () => update(true)));
  $("[data-response]").addEventListener("input", () => update(false));
  $("[data-copy]").addEventListener("click", (event) => copyText($("[data-output]").textContent, event.currentTarget));
  update(true);
}

      </ol>`;
    renderMap($("[data-present-map]"), { focus: slide.focus, presenter: true });
    $$("[data-slide]").forEach((button) => button.addEventListener("click", () => setSlide(Number(button.dataset.slide))));
    $("[data-present-prev]").addEventListener("click", () => setSlide(slideIndex - 1));

    $("[data-present-exit]").addEventListener("click", () => setPresentation(false));
  }

  function update() {
    const visible = nodes.filter((node) => riskFilter === "All" || node.risk === riskFilter);
    const current = nodes.find((node) => node.id === selected) || visible[0] || nodes[0];
    selected = current.id;
    renderMap($("[data-map]"), { focus: riskFilter === "Critical" ? criticalPath : [] });

  }

  function setSlide(index) {
    slideIndex = (index + slideData.length) % slideData.length;
    selected = slideData[slideIndex].selected;

    presenting = active;
    const presenterShell = $("[data-impact-presenter]");

    document.body.dataset.presentationMode = active ? "true" : "false";
    $("[data-impact-normal]").hidden = active;
    presenterShell.hidden = !active;
    if (active) {
      selected = slideData[slideIndex].selected;
      renderPresentation();
      presenterShell.focus();
    } else {
      update();
    }
  }
  $("[data-risk]").addEventListener("change", (event) => {
    riskFilter = event.target.value;
    update();
  });
  $("[data-critical]").addEventListener("click", () => {
    riskFilter = "Critical";
    $("[data-risk]").value = "Critical";
    update();
  });
  $("[data-copy]").addEventListener("click", (event) => {
    const current = nodes.find((node) => node.id === selected);
    copyText(`Reviewer checklist for ${current.label}\n- Confirm owner: ${current.owner} (${current.team})\n- Review evidence: ${current.evidence}\n- Validate upstream dependencies: ${current.upstream.join(", ") || "None"}\n- Validate downstream dependencies: ${current.downstream.join(", ") || "None"}\n- Critical path: ${criticalPath.map((id) => nodes.find((node) => node.id === id)?.label || id).join(" -> ")}\n- Record decision outside this demo`, event.currentTarget);
  });
  $$("[data-impact-present]").forEach((button) => button.addEventListener("click", () => setPresentation(true)));
  document.addEventListener("keydown", (event) => {
    const target = event.target;
    const isTyping = target && ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName);
    if (isTyping) return;
    if (event.key.toLowerCase() === "p" && !presenting) {
      event.preventDefault();
      setPresentation(true);
      return;
    }
    if (!presenting) return;
    if (event.key === "Escape") {
      event.preventDefault();
      setPresentation(false);
    } else if (event.key === "ArrowRight") {
      event.preventDefault();
      setSlide(slideIndex + 1);
    } else if (event.key === "ArrowLeft") {
      event.preventDefault();
      setSlide(slideIndex - 1);
    } else if (/^[1-6]$/.test(event.key)) {
      event.preventDefault();
      setSlide(Number(event.key) - 1);
    }
  });
  update();
}

function renderFlags() {
  renderShell();
  $("[data-workspace-title]").textContent = "Flag rollout risk";

  };
  const dependencies = {
    "checkout-v2": ["payment-routing", "legacy-fallback"],
    "bulk-export": ["new-dashboard"],
    "payment-routing": ["legacy-fallback"]
  };
  const key = "enterprise-html-flags-v2";
  let state = JSON.parse(localStorage.getItem(key) || "null") || { ...defaults };
  $("[data-controls]").innerHTML = `<h2>Rollout</h2><div class="control-group"><label>Target<select data-target><option>Internal pilot</option><option>5% customers</option><option>25% customers</option><option>100% customers</option></select></label><button data-reset>Reset</button></div>`;

  $("[data-workspace]").innerHTML = `<div data-flags></div><svg class="diagram" viewBox="0 0 760 250" data-flag-map aria-label="Feature flag dependency graph"></svg><pre class="output" data-output></pre>`;
  $("[data-inspector]").innerHTML = `<h2>Risk analysis</h2><div data-warnings></div>`;
  function update() {
    localStorage.setItem(key, JSON.stringify(state));
    $("[data-flags]").innerHTML = Object.keys(state).map((flag) => `<div class="toggle-row"><div><strong>${escapeHtml(flag)}</strong><p>${dependencies[flag] ? `Depends on: ${dependencies[flag].join(", ")}` : "No sample dependency"}</p></div><label class="switch"><input type="checkbox" data-flag="${flag}" ${state[flag] ? "checked" : ""}><span class="slider"></span></label></div>`).join("");
    const diff = Object.fromEntries(Object.entries(state).filter(([flag, value]) => defaults[flag] !== value));
    function dependencyViolations(flag) {
      const paths = [];
      const missing = new Set();
      function walk(current, path, visited) {
        if (visited.has(current)) return;
        const nextVisited = new Set(visited);
        nextVisited.add(current);
        (dependencies[current] || []).forEach((dep) => {
          const nextPath = [...path, dep];
          if (!state[dep]) {
            missing.add(dep);
            paths.push(nextPath);
          } else {
            walk(dep, nextPath, nextVisited);
          }
        });
      }
      walk(flag, [flag], new Set());
      return { paths, missing: [...missing] };
    }
    const warnings = Object.keys(dependencies).map((flag) => [flag, dependencyViolations(flag)]).filter(([flag, result]) => state[flag] && result.missing.length);
    const targetFactor = $("[data-target]").selectedIndex + 1;
    const blast = Object.values(state).filter(Boolean).length * targetFactor;
    $("[data-flag-map]").innerHTML = `
      <rect class="node ${state["checkout-v2"] ? "active" : ""}" x="60" y="70" width="150" height="58" rx="7"></rect><text x="88" y="106">checkout-v2</text>

      <rect class="node ${state["legacy-fallback"] ? "active" : ""}" x="300" y="145" width="170" height="58" rx="7"></rect><text x="324" y="181">legacy-fallback</text>
      <rect class="node ${state["bulk-export"] ? "active" : ""}" x="540" y="70" width="150" height="58" rx="7"></rect><text x="575" y="106">bulk-export</text>
      <path class="line hot" d="M210 99h90"></path><path class="line hot" d="M210 99 C260 140 270 174 300 174"></path><path class="line dashed" d="M470 64 C520 64 520 99 540 99"></path>`;
    setOutput(JSON.stringify(diff, null, 2) || "{}");
    $("[data-warnings]").innerHTML = `<div class="stat"><strong>${blast}</strong><span>Blast-radius score</span></div><div class="note">Scale: enabled flags x rollout stage (${targetFactor}). This is a review aid, not a production risk model.</div>` + (warnings.length ? warnings.map(([flag, result]) => `<div class="note danger">${escapeHtml(flag)} is on, but dependency is off: ${escapeHtml([...new Set(result.missing)].join(", "))}<br><span class="muted-text">Path: ${result.paths.map((path) => escapeHtml(path.join(" -> "))).join("; ")}</span></div>`).join("") : `<div class="note">No dependency warnings in this fictional flag set.</div>`) + `<div class="note">Target: ${escapeHtml($("[data-target]").value)}</div>`;
    $$("[data-flag]").forEach((input) => input.addEventListener("change", () => {
      state[input.dataset.flag] = input.checked;
      update();
    }));
  }
  $("[data-target]").addEventListener("change", update);
  $("[data-reset]").addEventListener("click", () => {
    state = { ...defaults };
    localStorage.removeItem(key);
    update();
  });
  $("[data-copy]").addEventListener("click", (event) => copyText($("[data-output]").textContent, event.currentTarget));
  $("[data-download]").addEventListener("click", () => downloadText("feature-flag-diff.json", $("[data-output]").textContent, "application/json;charset=utf-8"));
  update();
}

const renderers = {
  decision: renderDecision,
  meeting: renderMeeting,
  policy: renderPolicy,
  csv: renderCsv,
  risk: renderRisk,
  conversation: renderConversation,
  adr: renderAdr,
  impact: renderImpact,
  pr: renderPr,
  incident: renderIncident,
  control: renderControl,
  flags: renderFlags
};

try {
  if (!renderers[sample.type]) throw new Error(`Unknown sample type: ${sample.type}`);
  renderers[sample.type]();
} catch (error) {
  console.error(error);
  root.innerHTML = `<main class="sample-shell"><section class="panel"><h1>Sample could not render</h1><p>This self-contained artifact hit a runtime error. The page remains safe to share, but the demo needs review.</p><pre class="output" aria-live="polite">${escapeHtml(error.message)}</pre><p><a href="../index.html">Back to showcase</a></p></section></main>`;
}
  </script>
</body>
